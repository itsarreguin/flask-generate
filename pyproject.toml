[project]
name = "Flask-Generate"
version = "0.1.0"
description = "Flask"
authors = [
    {name = "Brandon Arreguin", email = "arreguin.tech@gmail.com"}
]
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "flask",
    "click"
]

[tool.poetry]
packages = [{include = "flask_generate", from = "src"}]

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
